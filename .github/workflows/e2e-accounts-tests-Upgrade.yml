name: e2e Acounts test Upgrade

on:
  workflow_dispatch:

env:
  IMAGE_PREFIX: ghcr.io/prestashopcorp/

jobs:
  setup:
    name: Setup Deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Tune kernel buffers
        run: |
          sysctl net.core.rmem_max || true
          sysctl net.core.rmem_default || true

          sudo sysctl -w net.core.rmem_max=2500000
          sudo sysctl -w net.core.rmem_default=2500000

          # verify
          sysctl net.core.rmem_max
          sysctl net.core.rmem_default

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v5
        with:
          path: ./e2e/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "node"

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        working-directory: ./e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            pw-browsers-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-pw.outputs.cache-hit != 'true'
        working-directory: ./e2e
        run: npx playwright install chromium

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: prestashopcorp
          password: ${{ secrets.DOWNLOADER_TOKEN }}

  run-test:
    name: Run Account tests
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        shop_version:
          - nightly-nginx
          - 8.2.0-8.1-fpm-alpine
          - 1.7.8.8-7.4-fpm-alpine
          - 1.6.1.24-7.1-fpm-alpine

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ./e2e/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            pw-browsers-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "node"

      - name: Generate .env in e2e
        working-directory: ./e2e
        run: |
          echo "BASE_URL=${{secrets.BASE_URL}}" >> .env
          echo "BASE_URL_FO=${{secrets.BASE_URL_FO}}" >> .env
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
          echo "OAUTH2URL=${{ secrets.OAUTH2URL }}" >> .env
          echo "ACCOUNTSAPIURL=${{ secrets.ACCOUNTSAPIURL }}" >> .env
          echo "ACCOUNTSUIURL=${{ secrets.ACCOUNTSUIURL }}" >> .env
          echo "QA_USER_AGENT=${{ secrets.QA_USER_AGENT}}" >> .env
          echo "ACCOUNT_EMAIL=${{ secrets.ACCOUNT_EMAIL}}" >> .env
          echo "ACCOUNT_PASSWORD=${{ secrets.ACCOUNT_PASSWORD}}" >> .env

      - name: Generate .env in e2e-env
        working-directory: ./e2e-env
        run: |
          echo "ACCOUNT_TAG=${{ secrets.ACCOUNT_TAG }}" >> .env
          echo "TUNNEL_SECRET=${{ secrets.TUNNEL_SECRET }}" >> .env
          echo "TUNNEL_ID=${{ secrets.TUNNEL_ID }}" >> .env
          echo "PS_DOMAIN=${{ secrets.PS_DOMAIN }}" >> .env
          echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env
          echo "DOWNLOADER_TOKEN=${{ secrets.DOWNLOADER_TOKEN }}" >> .env
          echo "PS_VERSION=${{ secrets.PS_VERSION }}" >> .env
          echo "PS_ACCOUNTS_VERSION=${{ secrets.PS_ACCOUNTS_VERSION }}" >> .env

      - name: Run test
        working-directory: ./e2e
        run: |
          npm run upgrade-tests -- ${{ matrix.shop_version  }}
        continue-on-error: true

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shop_version }}
          path: ./e2e/allure-results-${{ matrix.shop_version }}

  merge-allure:
    name: Merge Allure Results, Generate Report & Send Slack notification
    needs: run-test
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.allureTotals.outputs.passed }}
      failed: ${{ steps.allureTotals.outputs.failed }}
      broken: ${{ steps.allureTotals.outputs.broken }}
      skipped: ${{ steps.allureTotals.outputs.skipped }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Cache node_modules
        id: cache-node-merge
        uses: actions/cache@v5
        with:
          path: ./e2e/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-merge.outputs.cache-hit != 'true'
        working-directory: ./e2e
        run: npm ci

      - name: Download all allure artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./e2e/

      - name: Merge Allure Results
        working-directory: ./e2e
        run: npm run merge-allure-results

      - name: Generate Allure Report
        working-directory: ./e2e
        run: npm run generate-allure-report

      - name: Extract Allure totals (summary.json)
        id: allureTotals
        shell: bash
        run: |
          SUMMARY="e2e/allure-report/widgets/summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "summary.json introuvable: $SUMMARY"
            exit 1
          fi
          echo "passed=$(jq -r '.statistic.passed // 0' "$SUMMARY")" >> $GITHUB_OUTPUT
          echo "failed=$(jq -r '.statistic.failed // 0' "$SUMMARY")" >> $GITHUB_OUTPUT
          echo "broken=$(jq -r '.statistic.broken // 0' "$SUMMARY")" >> $GITHUB_OUTPUT
          echo "skipped=$(jq -r '.statistic.skipped // 0' "$SUMMARY")" >> $GITHUB_OUTPUT

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: allure-report
          path: ./e2e/allure-report

  report-and-notify:
    name: Report and Notify
    needs: merge-allure
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./e2e/allure-report

      - name: Build GitHub Summary
        shell: bash
        run: |
          SUMMARY="e2e/allure-report/widgets/summary.json"
          TEST_CASES_DIR="e2e/allure-report/data/test-cases"

          if [ ! -f "$SUMMARY" ]; then
            {
              echo "# Upgrade Account test results"
              echo
              echo "Allure summary not found."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PASSED=$(jq -r '.statistic.passed // 0' "$SUMMARY")
          FAILED=$(jq -r '.statistic.failed // 0' "$SUMMARY")
          BROKEN=$(jq -r '.statistic.broken // 0' "$SUMMARY")
          SKIPPED=$(jq -r '.statistic.skipped // 0' "$SUMMARY")
          TOTAL=$(jq -r '.statistic.total // 0' "$SUMMARY")
          DURATION_MS=$(jq -r '.time.duration // 0' "$SUMMARY")

          FAILED_TESTS=""
          FLAKY_TESTS=""
          FLAKY_COUNT=0

          if [ -d "$TEST_CASES_DIR" ]; then
            shopt -s nullglob
            TEST_CASE_FILES=("$TEST_CASES_DIR"/*.json)
            shopt -u nullglob

            if [ ${#TEST_CASE_FILES[@]} -gt 0 ]; then
              FAILED_TESTS=$(jq -r '
                select((.status // "") == "failed" or (.status // "") == "broken")
                | "- [" + (.status // "unknown") + "] " + (.fullName // .name // "Unnamed test")
              ' "${TEST_CASE_FILES[@]}")

              FLAKY_TESTS=$(jq -r '
                select((.flaky // false) == true)
                | "- " + (.fullName // .name // "Unnamed test")
              ' "${TEST_CASE_FILES[@]}")

              FLAKY_COUNT=$(jq -r '
                select((.flaky // false) == true)
                | 1
              ' "${TEST_CASE_FILES[@]}" | wc -l | tr -d ' ')
            fi
          fi

          DURATION_FMT=$(node -e '
            const ms = Number(process.argv[1] || 0);
            const totalSeconds = Math.floor(ms / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            const parts = [];
            if (h) parts.push(`${h}h`);
            if (m || h) parts.push(`${m}m`);
            parts.push(`${s}s`);
            console.log(parts.join(" "));
          ' "$DURATION_MS")

          {
            echo "# Upgrade Account test results"
            echo
            echo "## Test Results"
            echo
            echo "- Failed: $FAILED"
            echo "- Broken: $BROKEN"
            echo "- Passed: $PASSED"
            echo "- Skipped: $SKIPPED"
            echo
            echo "## Details"
            echo
            echo "- Total tests: $TOTAL"
            echo "- Duration: $DURATION_FMT"
            echo "- Flaky: $FLAKY_COUNT"
            echo
            if [ -n "$FAILED_TESTS" ]; then
              echo "## Failed Tests"
              echo
              echo "$FAILED_TESTS"
              echo
            fi
            if [ -n "$FLAKY_TESTS" ]; then
              echo "## Flaky Tests"
              echo
              echo "$FLAKY_TESTS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

